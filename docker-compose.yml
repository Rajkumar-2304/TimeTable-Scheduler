
services:
  # ─── Backend (Express + SQLite + Puppeteer) ───────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crt_backend
    restart: unless-stopped
    ports:
      - "5000:5000"       # Expose for direct API access (optional)
    environment:
      - NODE_ENV=production
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      - DATA_DIR=/app/data
    volumes:
      - db_data:/app/data  # Persist the SQLite database across restarts
    networks:
      - app_network

  # ─── Frontend (React + Vite → Nginx) ──────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crt_frontend
    restart: unless-stopped
    ports:
      - "80:80"            # Access the app at http://localhost
    depends_on:
      - backend
    networks:
      - app_network

# ─── Named Volumes ────────────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
